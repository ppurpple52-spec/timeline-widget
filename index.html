<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>월간 타임라인</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
/* 기존 스타일 그대로 유지 (생략 없이 모두 포함) */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff8f8;--card:#fff;--border:#f0d6d6;--text:#2a2a2a;--sub:#999;
  --header-bg:#fff0f0;--today:#e05555;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);padding:12px;min-height:100vh}
.widget{background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:2px 3px 0 var(--border)}
.header{background:var(--header-bg);border-bottom:1.5px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.h-left{display:flex;align-items:center;gap:8px}
.month-title{font-size:13px;font-weight:700;color:var(--text)}
.nav-btns{display:flex;gap:4px}
.nav-btns button{background:var(--card);border:1.5px solid var(--border);border-radius:8px;width:24px;height:24px;cursor:pointer;font-size:12px;color:var(--sub);display:flex;align-items:center;justify-content:center;font-weight:700}
.nav-btns button:hover{background:var(--border)}
.theme-btn,.notion-btn{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--sub);font-family:'Nunito',sans-serif}
.theme-btn:hover,.notion-btn:hover{background:var(--border)}
.timeline-scroll{overflow-x:auto;padding:10px 14px 14px}
.timeline-inner{min-width:660px}
.days-row{display:flex;margin-bottom:6px}
.day-cell{flex:1;min-width:24px;text-align:center}
.day-lbl{font-size:9px;color:var(--sub);display:block;margin-bottom:1px;font-family:'DM Mono',monospace}
.day-num{font-size:10px;font-weight:600;color:var(--sub);display:block;width:18px;height:18px;line-height:18px;border-radius:50%;margin:0 auto;font-family:'DM Mono',monospace}
.day-num.today{background:var(--today);color:#fff}
.day-num.weekend{color:#ccc}
.bars-area{position:relative;height:72px}
.bar{position:absolute;height:26px;border-radius:20px;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:700;cursor:grab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:transform 0.1s;border:1.5px solid transparent;user-select:none}
.bar:hover{transform:translateY(-1px);z-index:10}
.bar.dragging{opacity:0.5;cursor:grabbing}
.tooltip{position:fixed;background:#1a1a1a;color:#fff;font-size:10px;padding:4px 8px;border-radius:6px;pointer-events:none;z-index:1000;display:none;font-family:'DM Mono',monospace;white-space:nowrap}
.today-line{position:absolute;top:0;bottom:0;width:1.5px;background:var(--today);opacity:0.4;z-index:5}
.notion-panel{background:var(--header-bg);border-bottom:1.5px solid var(--border);padding:10px 14px;display:none}
.notion-panel.open{display:block}
.notion-panel p{font-size:11px;color:var(--sub);margin-bottom:8px}
.np-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.np-row label{font-size:11px;color:var(--text);width:80px;flex-shrink:0;font-weight:600}
.np-row input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:4px 8px;font-size:11px;font-family:'DM Mono',monospace;background:var(--card);color:var(--text);outline:none}
.fetch-btn{background:var(--today);color:#fff;border:none;border-radius:8px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;width:100%}
.fetch-btn:hover{opacity:0.85}
.status{font-size:10px;color:var(--sub);margin-top:4px;text-align:center;min-height:16px}
.theme-panel{background:var(--header-bg);border-bottom:1.5px solid var(--border);padding:10px 14px;display:none}
.theme-panel.open{display:block}
.theme-grid{display:flex;gap:6px;flex-wrap:wrap}
.theme-chip{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;cursor:pointer;border:2px solid transparent;font-family:'Nunito',sans-serif}
.theme-chip.active{border-color:var(--text)}
.no-projects{text-align:center;font-size:11px;color:var(--sub);padding:20px 0}
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="h-left">
      <span style="font-size:16px">📅</span>
      <span class="month-title" id="monthTitle"></span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <button class="theme-btn" onclick="toggleThemePanel()">🎨 테마</button>
      <button class="notion-btn" onclick="toggleNotionPanel()">🔗 노션 연동</button>
      <div class="nav-btns">
        <button onclick="changeMonth(-1)">‹</button>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
  </div>

  <div class="theme-panel" id="themePanel">
    <div class="theme-grid" id="themeGrid"></div>
  </div>

  <div class="notion-panel" id="notionPanel">
    <p>Notion DB의 날짜 속성(시작일~종료일)이 설정된 항목을 불러와요.</p>
    <div class="np-row">
      <label>API 키</label>
      <input id="apiKey" type="password" placeholder="ntn_xxxxxxxxxxxx"/>
    </div>
    <div class="np-row">
      <label>DB ID</label>
      <input id="dbId" type="text" placeholder="32자리 데이터베이스 ID"/>
    </div>
    <div class="np-row">
      <label>날짜 속성명</label>
      <input id="dateProp" type="text" placeholder="날짜" value="날짜"/>
    </div>
    <button class="fetch-btn" onclick="fetchNotion()">불러오기</button>
    <div class="status" id="fetchStatus"></div>
  </div>

  <div class="timeline-scroll">
    <div class="timeline-inner" id="timelineInner"></div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// [개선] 데이터 유지 로직이 추가된 스크립트
const PROXY='https://notion-proxy.minjudy55.workers.dev';
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['S','M','T','W','T','F','S'];
const THEMES=[
  {name:'핑크',bg:'#fff8f8',card:'#fff',border:'#f0d6d6',hbg:'#fff0f0',today:'#e05555',bars:['#fadadd','#f5c0cc','#f0a8bc','#eb90ac','#e6789c','#e1608c','#dc487c','#d7306c'],barst:['#993556','#8a2a4a','#7b1f3e','#6c1432','#5d0926','#4e001a','#3f000e','#300002']},
  {name:'파스텔',bg:'#f8fbff',card:'#fff',border:'#d6e8f0',hbg:'#f0f6ff',today:'#5588e0',bars:['#fadadd','#d5eaf7','#d4edd8','#fde8c8','#e8d5f5','#d1eee7','#fce4d4','#f5f5dc'],barst:['#993556','#185fa5','#3b6d11','#854f0b','#534ab7','#0f6e56','#993c1d','#6b6b00']},
  {name:'블랙',bg:'#1a1a1a',card:'#2a2a2a',border:'#3a3a3a',hbg:'#222',today:'#e05555',bars:['#4a2a2a','#2a3a4a','#2a4a2a','#4a3a2a','#3a2a4a','#2a4a3a','#4a3a2a','#4a4a2a'],barst:['#ffaaaa','#aaccff','#aaffaa','#ffddaa','#ccaaff','#aaffdd','#ffccaa','#ffffaa']},
  {name:'화이트',bg:'#fafafa',card:'#fff',border:'#e8e8e8',hbg:'#f5f5f5',today:'#333',bars:['#f0f0f0','#e8e8e8','#e0e0e0','#d8d8d8','#d0d0d0','#c8c8c8','#c0c0c0','#b8b8b8'],barst:['#444','#444','#444','#444','#444','#444','#444','#444']},
  {name:'보라',bg:'#f8f5ff',card:'#fff',border:'#ddd0f5',hbg:'#f0ebff',today:'#7755cc',bars:['#e8d5f5','#d5c0f0','#c2abeb','#af96e6','#9c81e1','#896cdc','#7657d7','#6342d2'],barst:['#3a1a6b','#3a1a6b','#3a1a6b','#3a1a6b','#fff','#fff','#fff','#fff']},
  {name:'그린',bg:'#f5fff8',card:'#fff',border:'#c8ecd0',hbg:'#eeffee',today:'#3a9955',bars:['#d4edd8','#bde3c4','#a6d9b0','#8fcf9c','#78c588','#61bb74','#4ab160','#33a74c'],barst:['#1a4a22','#1a4a22','#1a4a22','#1a4a22','#fff','#fff','#fff','#fff']},
  {name:'블루',bg:'#f5f8ff',card:'#fff',border:'#c8d8f0',hbg:'#eef4ff',today:'#3366cc',bars:['#d5eaf7','#bcd8f4','#a3c6f1','#8ab4ee','#71a2eb','#5890e8','#3f7ee5','#266ce2'],barst:['#1a3366','#1a3366','#1a3366','#1a3366','#fff','#fff','#fff','#fff']},
  {name:'노랑',bg:'#fffdf0',card:'#fff',border:'#f0e8b0',hbg:'#fffbdd',today:'#cc9900',bars:['#fde8c8','#fde0a8','#fdd888','#fdd068','#fdc848','#fdc028','#fdb808','#f0aa00'],barst:['#5a3a00','#5a3a00','#5a3a00','#5a3a00','#5a3a00','#5a3a00','#5a3a00','#fff']},
];

// 로컬 저장소에서 데이터 불러오기
let currentTheme = parseInt(localStorage.getItem('saved_theme')) || 0;
let year=new Date().getFullYear();
let month=new Date().getMonth();
let projects=[];
let dragIdx=null;

function applyTheme(idx){
  currentTheme=idx;
  localStorage.setItem('saved_theme', idx); // 테마 저장
  const t=THEMES[idx];
  const r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--card',t.card);
  r.setProperty('--border',t.border);r.setProperty('--header-bg',t.hbg);
  r.setProperty('--today',t.today);
  document.body.style.background=t.bg;
  renderThemeGrid();render();
}

function renderThemeGrid(){
  document.getElementById('themeGrid').innerHTML=THEMES.map((th,i)=>
    `<div class="theme-chip${i===currentTheme?' active':''}" style="background:${th.hbg};color:${th.today};border-color:${i===currentTheme?th.today:'transparent'}" onclick="applyTheme(${i})">${th.name}</div>`
  ).join('');
}

function toggleThemePanel(){
  document.getElementById('themePanel').classList.toggle('open');
  document.getElementById('notionPanel').classList.remove('open');
}
function toggleNotionPanel(){
  document.getElementById('notionPanel').classList.toggle('open');
  document.getElementById('themePanel').classList.remove('open');
}

function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function dow(y,m,d){return new Date(y,m,d).getDay();}
function isToday(y,m,d){const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d;}

function assignRows(projs){
  const rows=[null,null];
  return projs.map(p=>{
    for(let r=0;r<2;r++){if(rows[r]===null||rows[r]<p.start){rows[r]=p.end;return r;}}
    return -1;
  });
}

function render(){
  const total=daysInMonth(year,month);
  document.getElementById('monthTitle').textContent=`${MONTHS_EN[month]} ${year}`;
  const t=THEMES[currentTheme];
  let todayPct=null;
  const now=new Date();
  if(now.getFullYear()===year&&now.getMonth()===month)
    todayPct=((now.getDate()-0.5)/total*100).toFixed(2);
  let html='<div class="days-row">';
  for(let d=1;d<=total;d++){
    const w=dow(year,month,d),wk=w===0||w===6,td=isToday(year,month,d);
    html+=`<div class="day-cell"><span class="day-lbl">${DAYS[w]}</span><span class="day-num${td?' today':''}${wk&&!td?' weekend':''}">${d}</span></div>`;
  }
  html+='</div><div class="bars-area">';
  if(todayPct!==null)html+=`<div class="today-line" style="left:${todayPct}%"></div>`;
  if(projects.length===0){
    html+='<div class="no-projects">노션 연동으로 프로젝트를 불러와 주세요.</div>';
  }else{
    const rowAssign=assignRows(projects);
    projects.forEach((p,i)=>{
      const row=rowAssign[i];if(row===-1)return;
      const bg=t.bars[p.colorIdx%8],tc=t.barst[p.colorIdx%8];
      const left=((p.start-1)/total*100).toFixed(2)+'%';
      const width=((p.end-p.start+1)/total*100).toFixed(2)+'%';
      const top=row===0?'3px':'40px';
      const s=`${year}.${String(month+1).padStart(2,'0')}.${String(p.start).padStart(2,'0')}`;
      const e=`${year}.${String(month+1).padStart(2,'0')}.${String(p.end).padStart(2,'0')}`;
      html+=`<div class="bar" draggable="true" style="left:${left};width:${width};top:${top};background:${bg};color:${tc};border-color:${tc}22" data-idx="${i}"
        onmouseenter="showTip(event,'${p.name} | ${s} ~ ${e}')" onmouseleave="hideTip()"
        ondragstart="dragStart(event,${i})" ondragover="dragOver(event)" ondrop="dragDrop(event,${i})" ondragend="dragEnd()"
      >${p.name}</div>`;
    });
  }
  html+='</div>';
  document.getElementById('timelineInner').innerHTML=html;
}

function showTip(e,text){const tip=document.getElementById('tooltip');tip.textContent=text;tip.style.display='block';}
function hideTip(){document.getElementById('tooltip').style.display='none';}
document.addEventListener('mousemove',e=>{
  const tip=document.getElementById('tooltip');
  if(tip.style.display==='block'){tip.style.left=(e.clientX+10)+'px';tip.style.top=(e.clientY-28)+'px';}
});

function dragStart(e,i){dragIdx=i;}
function dragOver(e){e.preventDefault();}
function dragDrop(e,t){
  e.preventDefault();if(dragIdx===null||dragIdx===t)return;
  const a=[...projects];const[m]=a.splice(dragIdx,1);a.splice(t,0,m);projects=a;render();
}
function dragEnd(){dragIdx=null;}
function changeMonth(dir){
  month+=dir;if(month>11){month=0;year++;}if(month<0){month=11;year--;}render();
}

// 핵심 기능: 노션 데이터 호출 및 자동 저장
async function fetchNotion(){
  const apiKey=document.getElementById('apiKey').value.trim();
  const dbId=document.getElementById('dbId').value.trim().replace(/-/g,'');
  const dateProp=document.getElementById('dateProp').value.trim()||'날짜';
  const status=document.getElementById('fetchStatus');

  if(!apiKey||!dbId){status.textContent='API 키와 DB ID를 입력해 주세요.';return;}

  // 입력값 로컬 저장소에 저장
  localStorage.setItem('notion_api_key', apiKey);
  localStorage.setItem('notion_db_id', dbId);
  localStorage.setItem('notion_date_prop', dateProp);

  status.textContent='불러오는 중...';
  try{
    const res=await fetch(`${PROXY}/v1/databases/${dbId}/query`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${apiKey}`,
        'Notion-Version':'2022-06-28',
        'Content-Type':'application/json',
      },
      body:JSON.stringify({page_size:100})
    });
    if(!res.ok){const err=await res.json();status.textContent=`오류: ${err.message||res.status}`;return;}
    const data=await res.json();
    const loaded=[];let colorIdx=0;
    data.results.forEach(page=>{
      const title=Object.values(page.properties).find(p=>p.type==='title')?.title?.[0]?.plain_text||'(제목없음)';
      const dp=page.properties?.[dateProp];
      if(!dp||dp.type!=='date'||!dp.date||!dp.date.end)return;
      const s=dp.date.start,e=dp.date.end;
      const sy=parseInt(s.slice(0,4)),sm=parseInt(s.slice(5,7))-1,sd=parseInt(s.slice(8,10));
      const ey=parseInt(e.slice(0,4)),em=parseInt(e.slice(5,7))-1,ed=parseInt(e.slice(8,10));
      const total=daysInMonth(year,month);
      const ps=sy<year||(sy===year&&sm<month)?1:sy===year&&sm===month?sd:null;
      const pe=ey>year||(ey===year&&em>month)?total:ey===year&&em===month?ed:null;
      if(ps===null||pe===null||ps>pe)return;
      loaded.push({name:title,start:ps,end:pe,colorIdx:colorIdx++%8});
    });
    projects=loaded;
    status.textContent=loaded.length>0?`✓ ${loaded.length}개 프로젝트를 불러왔어요.`:'이번 달 해당 프로젝트가 없어요.';
    render();
  }catch(err){
    status.textContent=`오류: ${err.message}`;
  }
}

// 페이지 로드 시 실행될 초기화 로직
window.onload = function() {
  const savedKey = localStorage.getItem('notion_api_key');
  const savedDb = localStorage.getItem('notion_db_id');
  const savedProp = localStorage.getItem('notion_date_prop');

  if(savedKey) document.getElementById('apiKey').value = savedKey;
  if(savedDb) document.getElementById('dbId').value = savedDb;
  if(savedProp) document.getElementById('dateProp').value = savedProp;

  applyTheme(currentTheme);
  renderThemeGrid();

  // 저장된 정보가 있으면 자동으로 데이터 가져오기
  if(savedKey && savedDb) {
    fetchNotion();
  } else {
    render();
  }
};
</script>
</body>
</html>
